<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable: full bleed bg, content in safe zone (80% = 204px inset 51px each side) -->
  <defs>
    <radialGradient id="bgGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%"   stop-color="#FFF0F3"/>
      <stop offset="55%"  stop-color="#F9D8DF"/>
      <stop offset="100%" stop-color="#EDB8C4"/>
    </radialGradient>
    <linearGradient id="heartFill" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#F2A0B4"/>
      <stop offset="40%"  stop-color="#D88C9A"/>
      <stop offset="100%" stop-color="#B8607A"/>
    </linearGradient>
    <linearGradient id="glassSheen" x1="0%" y1="0%" x2="55%" y2="80%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rimWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F2A0B4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFDDE5" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="petalFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFDDE5" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="heartShadow" x="-25%" y="-20%" width="150%" height="155%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#C4607A" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="22" stdDeviation="36" flood-color="#D88C9A" flood-opacity="0.18"/>
    </filter>
    <filter id="specular">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Full bleed background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="512" height="512" fill="none" stroke="#C4607A" stroke-width="74" stroke-opacity="0.06"/>

  <!-- Heart scaled to safe zone -->
  <g transform="translate(56, 56) scale(0.78)">
    <g filter="url(#heartShadow)">
      <path d="M256 394
               C 149 325, 69 264, 69 186
               C 69 133, 112 96, 162 96
               C 194 96, 224 112, 256 144
               C 288 112, 318 96, 350 96
               C 400 96, 443 133, 443 186
               C 443 264, 363 325, 256 394 Z"
            fill="url(#heartFill)"/>
    </g>
    <path d="M256 394
             C 149 325, 69 264, 69 186
             C 69 133, 112 96, 162 96
             C 194 96, 224 112, 256 144
             C 288 112, 318 96, 350 96
             C 400 96, 443 133, 443 186
             C 443 264, 363 325, 256 394 Z"
          fill="url(#rimWarm)"/>
    <path d="M162 104 C 117 133, 80 170, 74 213 C 69 245, 85 282, 112 308
             C 133 267, 133 208, 165 170 C 181 149, 202 132, 228 112 Z"
          fill="url(#glassSheen)"/>
    <ellipse cx="176" cy="149" rx="35" ry="45" fill="white" opacity="0.5" filter="url(#specular)"/>
    <ellipse cx="165" cy="133" rx="15" ry="19" fill="white" opacity="0.82"/>
    <g transform="translate(256, 245)" opacity="0.92">
      <ellipse cx="0" cy="-35" rx="13" ry="26" fill="url(#petalFill)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-35" rx="13" ry="26" fill="url(#petalFill)" transform="rotate(72)"/>
      <ellipse cx="0" cy="-35" rx="13" ry="26" fill="url(#petalFill)" transform="rotate(144)"/>
      <ellipse cx="0" cy="-35" rx="13" ry="26" fill="url(#petalFill)" transform="rotate(216)"/>
      <ellipse cx="0" cy="-35" rx="13" ry="26" fill="url(#petalFill)" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="15" fill="white" opacity="0.95"/>
      <circle cx="0" cy="0" r="8" fill="#F2A0B4" opacity="0.8"/>
    </g>
  </g>
</svg>
