<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#e8a0a8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MamaCare"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>MamaCare — Pregnancy Companion</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <h2 style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        Mama<span>Care</span> <i data-lucide="flower-2" style="color: var(--color-primary);"></i>
      </h2>
      <p>Complete Pregnancy Companion</p>
    </div>
    <div class="auth-step" id="authStep1">
      <h3>Login / Sign Up</h3>
      <p>Apna email daalo — hum ek magic link bhejenge. Password yaad karne ki zarurat nahi!</p>
      <input class="auth-input" type="email" id="authEmail" placeholder="aapka@email.com" onkeydown="if(event.key==='Enter')MC.sendOTP()"/>
      <button class="auth-btn auth-btn-primary" id="authSendBtn" onclick="MC.sendOTP()">
        Magic Link Bhejo <i data-lucide="wand-2" class="app-icon-inline"></i>
      </button>
      <p class="auth-msg" id="authMsg"></p>
    </div>
  </div>
</div>

<div id="topBar" style="display:none">
  <div class="top-inner">
    <a class="top-logo" href="#" style="display: flex; align-items: center; gap: 4px;">
      Mama<span>Care</span> <i data-lucide="flower-2" style="width: 18px; color: var(--color-primary);"></i>
    </a>
    <div class="top-tabs" id="topTabs">
      <button class="top-tab active" data-page="mood"><i data-lucide="smile" class="app-icon-inline"></i> Mood</button>
      <button class="top-tab" data-page="dashboard"><i data-lucide="layout-dashboard" class="app-icon-inline"></i> Dashboard</button>
      <button class="top-tab" data-page="due"><i data-lucide="calendar-heart" class="app-icon-inline"></i> Due Date</button>
      <button class="top-tab" data-page="weight"><i data-lucide="scale" class="app-icon-inline"></i> Weight</button>
      <button class="top-tab" data-page="yoga"><i data-lucide="activity" class="app-icon-inline"></i> Yoga</button>
      <button class="top-tab" data-page="sleep"><i data-lucide="moon" class="app-icon-inline"></i> Sleep</button>
      <button class="top-tab" data-page="nutrition"><i data-lucide="apple" class="app-icon-inline"></i> Nutrition</button>
      <button class="top-tab" data-page="medicine"><i data-lucide="pill" class="app-icon-inline"></i> Meds</button>
      <button class="top-tab" data-page="bag"><i data-lucide="briefcase-medical" class="app-icon-inline"></i> Bag</button>
      <button class="top-tab" data-page="names"><i data-lucide="baby" class="app-icon-inline"></i> Names</button>
      <button class="top-tab" data-page="journal"><i data-lucide="book-heart" class="app-icon-inline"></i> Journal</button>
      <button class="top-tab" data-page="appointments"><i data-lucide="stethoscope" class="app-icon-inline"></i> Appts</button>
      <button class="top-tab" data-page="birth"><i data-lucide="clipboard-list" class="app-icon-inline"></i> Birth Plan</button>
      <button class="top-tab" data-page="postpartum"><i data-lucide="heart-pulse" class="app-icon-inline"></i> Postpartum</button>
      <button class="top-tab" data-page="symptoms"><i data-lucide="thermometer" class="app-icon-inline"></i> Symptoms</button>
      <button class="top-tab" data-page="sos" style="color: var(--color-danger);"><i data-lucide="alert-triangle" class="app-icon-inline"></i> SOS</button>
    </div>
    <div class="top-user">
      <span id="topUserEmail"></span>
      <button class="btn btn-g btn-sm" onclick="MC.logout()"><i data-lucide="log-out" class="app-icon-inline"></i></button>
    </div>
  </div>
</div>

<nav id="bottomNav">
  <div class="bn-inner">
    <button class="bn-item active" data-page="mood">
      <div class="bn-icon"><i data-lucide="smile"></i></div>
      <div class="bn-label">Mood</div>
    </button>
    <button class="bn-item" data-page="dashboard">
      <div class="bn-icon"><i data-lucide="layout-dashboard"></i></div>
      <div class="bn-label">Overview</div>
    </button>
    <button class="bn-item" data-page="due">
      <div class="bn-icon"><i data-lucide="calendar-heart"></i></div>
      <div class="bn-label">Timeline</div>
    </button>
    <button class="bn-item" data-page="yoga">
      <div class="bn-icon"><i data-lucide="activity"></i></div>
      <div class="bn-label">Yoga</div>
    </button>
    <button class="bn-item" id="moreBtn">
      <div class="bn-icon"><i data-lucide="grid-2x2"></i></div>
      <div class="bn-label">More</div>
    </button>
  </div>
</nav>

<div id="moreMenu">
  <div class="more-grid">
    <div class="more-item" data-page="weight"><div class="mi-icon"><i data-lucide="scale"></i></div><div class="mi-label">Weight</div></div>
    <div class="more-item" data-page="sleep"><div class="mi-icon"><i data-lucide="moon"></i></div><div class="mi-label">Sleep</div></div>
    <div class="more-item" data-page="nutrition"><div class="mi-icon"><i data-lucide="apple"></i></div><div class="mi-label">Nutrition</div></div>
    <div class="more-item" data-page="medicine"><div class="mi-icon"><i data-lucide="pill"></i></div><div class="mi-label">Meds</div></div>
    <div class="more-item" data-page="bag"><div class="mi-icon"><i data-lucide="briefcase-medical"></i></div><div class="mi-label">Bag</div></div>
    <div class="more-item" data-page="names"><div class="mi-icon"><i data-lucide="baby"></i></div><div class="mi-label">Names</div></div>
    <div class="more-item" data-page="journal"><div class="mi-icon"><i data-lucide="book-heart"></i></div><div class="mi-label">Journal</div></div>
    <div class="more-item" data-page="appointments"><div class="mi-icon"><i data-lucide="stethoscope"></i></div><div class="mi-label">Appts</div></div>
    <div class="more-item" data-page="birth"><div class="mi-icon"><i data-lucide="clipboard-list"></i></div><div class="mi-label">Birth Plan</div></div>
    <div class="more-item" data-page="postpartum"><div class="mi-icon"><i data-lucide="heart-pulse"></i></div><div class="mi-label">Postpartum</div></div>
    <div class="more-item" data-page="symptoms"><div class="mi-icon"><i data-lucide="thermometer"></i></div><div class="mi-label">Symptoms</div></div>
    <div class="more-item" data-page="sos"><div class="mi-icon" style="color: var(--color-danger);"><i data-lucide="alert-triangle"></i></div><div class="mi-label">SOS</div></div>
  </div>
</div>

<footer>
  <strong style="color:var(--color-primary); display:inline-flex; align-items:center; gap:4px;">
    MamaCare <i data-lucide="flower-2" class="app-icon-inline"></i>
  </strong> v7.2 <br/>
  <span style="font-size:11px">Yeh app medical advice replace nahi karta</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>
  // This tells Lucide to replace all <i data-lucide="..."> tags with actual SVGs
  lucide.createIcons();
</script>
  <script src="app.js?v=2"></script>

</body>
</html>
